<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>La Cabaña — Horarios</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F5EFE6; --bg2:#EDE5D8; --bg3:#E2D8C8;
  --surface:#FFF; --surface2:#FBF7F1;
  --brand:#2B1810; --brand2:#4A2C1F;
  --accent:#E8720C; --accent2:#FF9A3C;
  --text:#1A0F0A; --text2:#5C3D2E; --text3:#9C7B6B;
  --green:#2D6A4F; --green-l:rgba(45,106,79,.15); --green-t:#2D6A4F; --green-bg:#E8F5F0;
  --red:#C0392B;   --red-l:rgba(192,57,43,.15);   --red-t:#C0392B;   --red-bg:#FDF0EE;
  --blue:#1A5276;  --blue-l:rgba(26,82,118,.15);  --blue-t:#1A5276;  --blue-bg:#EAF2FB;
  --amber:#856A00; --amber-l:rgba(133,106,0,.15); --amber-t:#856A00; --amber-bg:#FFF9E6;
  --border:rgba(43,24,16,.1); --border2:rgba(43,24,16,.15);
  --shadow:0 2px 12px rgba(43,24,16,.08); --shadow2:0 4px 24px rgba(43,24,16,.12);
  --r:14px;--rsm:8px;
  /* compat */
  --cafe:#2B1810;--cafe-mid:#4A2C1F;--cafe-light:#7A5040;
  --crema:#F5EFE6;--naranja:#E8720C;--naranja-d:#C5600A;
}
html,body{height:100%;background:var(--bg);}
body{font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;}

/* SCREENS */
.screen{display:none;min-height:100vh;background:var(--bg);}
.screen.active{display:flex;flex-direction:column;}

/* ═══ LOGIN ═══ */
#sc-login{background:var(--bg);flex-direction:column;}
.login-wrap{width:100%;max-width:360px;}
.login-logo{text-align:center;margin-bottom:2rem;}
.login-logo-icon{display:none;}

.login-logo-name{display:none;}
.login-logo-sub{display:none;}
.login-card{background:var(--surface);border:1px solid var(--bg3);border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:12px;}
.login-card h2{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;text-align:center;}
.field{margin-bottom:14px;}
.field label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;}
.field select,.field input{width:100%;padding:12px 14px;background:var(--surface);border:1.5px solid var(--bg3);border-radius:10px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;}
.field select:focus,.field input:focus{border-color:var(--accent);}
.field select option{background:#fff;color:var(--text);}
.btn-primary{width:100%;padding:14px;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:12px;cursor:pointer;letter-spacing:.3px;transition:all .15s;box-shadow:0 4px 14px rgba(232,114,12,.3);}
.btn-primary:hover{opacity:.9;}
.btn-secondary{width:100%;padding:11px;background:transparent;color:var(--text3);font-size:12px;font-weight:500;border:1px solid var(--bg3);border-radius:10px;cursor:pointer;margin-top:8px;transition:all .15s;}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}

/* ═══ APP SHELL ═══ */
.app-header{background:var(--surface);border-bottom:1px solid var(--bg3);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100;}
.app-hdr-left{display:flex;align-items:center;gap:9px;}
.app-hdr-icon{width:32px;height:32px;background:var(--naranja);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.app-hdr-icon svg{width:16px;height:16px;fill:var(--brand);}
.app-hdr-title{font-family:'DM Serif Display',serif;font-size:15px;font-weight:400;color:var(--brand);}
.app-hdr-sub{font-size:11px;color:var(--text3);}
.app-hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-avatar{width:32px;height:32px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.hdr-btn{width:32px;height:32px;border-radius:8px;background:var(--bg2);border:1px solid var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.hdr-btn svg{width:16px;height:16px;stroke:var(--text2);fill:none;stroke-width:2;}

.app-body{flex:1;overflow-y:auto;padding:14px 16px 80px;scrollbar-width:none;background:var(--bg);}
.app-body::-webkit-scrollbar{display:none;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--bg3);box-shadow:0 -2px 12px rgba(43,24,16,.07);display:flex;padding:8px 0 16px;z-index:100;}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:0 4px;}
.bn svg{width:20px;height:20px;stroke-width:2;fill:none;stroke-linecap:round;}
.bn.active svg{stroke:var(--accent);}
.bn:not(.active) svg{stroke:var(--text3);}
.bn-lbl{font-size:9px;font-weight:600;letter-spacing:.2px;}
.bn.active .bn-lbl{color:var(--accent);}
.bn:not(.active) .bn-lbl{color:var(--text3);}
.bn-dot{width:4px;height:4px;border-radius:50%;background:var(--naranja);}

/* ═══ WEEK SCHEDULE ═══ */
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.week-nav{display:flex;align-items:center;gap:8px;}
.week-nav-btn{width:32px;height:32px;border-radius:8px;background:var(--surface);border:1px solid var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.week-nav-btn svg{width:14px;height:14px;stroke:var(--text2);fill:none;stroke-width:2.5;stroke-linecap:round;}
.week-label{font-size:13px;font-weight:700;color:var(--text);}
.week-pub-btn{padding:7px 14px;background:var(--green-bg);border:1px solid rgba(45,106,79,.3);border-radius:10px;color:var(--green);font-size:11px;font-weight:700;cursor:pointer;}
.week-pub-btn.published{background:var(--bg2);border-color:var(--bg3);color:var(--text3);}

/* PUNTO TABS */
.punto-tabs{display:flex;gap:8px;margin-bottom:14px;}
.punto-tab{flex:1;padding:10px;border-radius:10px;text-align:center;cursor:pointer;transition:all .15s;}
.punto-tab.active{background:var(--accent);color:#fff;}
.punto-tab:not(.active){background:var(--surface);border:1px solid var(--bg3);color:var(--text3);}
.punto-tab-name{font-size:12px;font-weight:700;}
.punto-tab-sub{font-size:10px;margin-top:1px;opacity:.7;}

/* AREA SECTION */
.area-section{margin-bottom:16px;}
.area-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.area-badge{font-size:10px;padding:3px 10px;border-radius:8px;font-weight:700;}
.area-cocina{background:var(--amber-l);color:var(--amber-t);}
.area-recepcion{background:var(--blue-l);color:var(--blue-t);}
.area-cajero{background:var(--blue-l);color:var(--blue-t);}
.area-domi{background:var(--green-l);color:var(--green-t);}

/* EMPLOYEE ROW */
.emp-card{background:var(--surface);border:1px solid var(--bg3);border-radius:12px;box-shadow:var(--shadow);margin-bottom:8px;overflow:hidden;}
.emp-card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;gap:8px;}
.emp-info{display:flex;align-items:center;gap:8px;min-width:0;flex-shrink:1;}
.emp-avatar{width:30px;height:30px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.emp-name{font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;}
.emp-meta{font-size:10px;color:var(--text3);margin-top:1px;}
.emp-week-dots{display:flex;gap:3px;}
.day-dot{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;cursor:pointer;transition:all .12s;flex-shrink:0;}
.day-dot.work{background:rgba(59,109,17,.2);color:var(--green-t);}
.day-dot.rest{background:rgba(255,145,0,.2);color:var(--naranja);}
.day-dot.other{background:rgba(24,95,165,.2);color:var(--blue-t);}
.day-dot.empty{background:var(--bg3);color:var(--text3);}
.day-dot:hover{transform:scale(1.15);}

/* SCHEDULE GRID */
.sched-grid{padding:10px 12px 12px;border-top:1px solid var(--border);}
.sched-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.sched-day{text-align:center;}
.sched-day-name{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:4px;}
.sched-day-cell{background:var(--surface2);border:1px solid var(--bg3);border-radius:8px;padding:4px 3px;min-height:62px;cursor:pointer;transition:all .12s;position:relative;}
.sched-day-cell:hover{border-color:var(--accent);}
.sched-day-cell.descanso{background:var(--amber-bg);border-color:rgba(133,106,0,.2);}
.sched-day-cell.otro-punto{background:rgba(24,95,165,.12);border-color:rgba(24,95,165,.3);}
.cell-start{font-size:10px;font-weight:700;color:var(--text);display:block;}
.cell-pico{font-size:9px;color:var(--accent);font-weight:600;display:block;margin-top:1px;background:var(--amber-bg);border-radius:3px;padding:0 2px;}
.cell-end{font-size:9px;color:var(--text3);display:block;}
.cell-tag{font-size:8px;font-weight:700;color:var(--accent);}
.cell-otro{font-size:9px;color:var(--blue-t);font-weight:700;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,15,10,.6);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0;}
.modal-overlay.hidden{display:none;}
.modal-box{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:18px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.modal-opt{padding:11px 12px;border-radius:10px;background:var(--bg2);border:1.5px solid transparent;cursor:pointer;transition:all .15s;}
.modal-opt:hover{border-color:var(--naranja);}
.modal-opt.selected{border-color:var(--accent);background:#FFF0E6;}
.modal-opt-title{font-size:12px;font-weight:700;color:var(--text);}
.modal-opt-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.modal-row{margin-bottom:12px;}
.modal-row label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;}
.modal-row input,.modal-row select{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--bg3);border-radius:10px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;}
.modal-row input:focus,.modal-row select:focus{border-color:var(--accent);}
.modal-row select option{background:#fff;color:var(--text);}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.mbtn-ok{flex:1;padding:12px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;border:none;border-radius:10px;cursor:pointer;}
.mbtn-cancel{flex:1;padding:12px;background:var(--bg2);color:var(--text2);font-size:13px;border:1px solid var(--bg3);border-radius:10px;cursor:pointer;}

/* SOLICITUDES */
.sol-card{background:var(--surface);border:1px solid var(--bg3);border-radius:12px;box-shadow:var(--shadow);padding:13px;margin-bottom:8px;}
.sol-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sol-name{font-size:13px;font-weight:700;color:var(--text);}
.sol-date{font-size:11px;color:var(--text3);}
.sol-msg{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.4;}
.sol-btns{display:flex;gap:6px;}
.sol-btn-ok{flex:1;padding:8px;background:var(--green-bg);color:var(--green);border:1px solid rgba(45,106,79,.2);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.sol-btn-no{flex:1;padding:8px;background:var(--red-bg);color:var(--red);border:1px solid rgba(192,57,43,.2);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.sol-status{font-size:10px;padding:3px 9px;border-radius:8px;font-weight:700;}
.sol-ok{background:var(--green-bg);color:var(--green);}
.sol-no{background:var(--red-bg);color:var(--red);}
.sol-pend{background:var(--amber-bg);color:var(--amber);}

/* MI HORARIO */
.my-week{background:var(--surface);border:1px solid var(--bg3);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;}
.my-week-head{background:var(--brand);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;}
.my-week-title{font-family:'DM Serif Display',serif;font-size:14px;font-weight:400;color:#FDF6EE;}
.my-week-pub{font-size:10px;padding:2px 8px;border-radius:6px;}
.my-days{display:grid;grid-template-columns:repeat(7,1fr);}
.my-day{padding:8px 4px;text-align:center;border-right:1px solid var(--border);}
.my-day:last-child{border-right:none;}
.my-day-name{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;margin-bottom:4px;}
.my-day-content{font-size:10px;}
.my-day.descanso{background:var(--amber-bg);}
.my-day.today{background:#FFF0E6;border-bottom:2px solid var(--accent);}
.my-time{font-size:11px;font-weight:700;color:var(--text);}
.my-pico{font-size:9px;color:#fff;background:var(--accent);border-radius:4px;padding:1px 4px;display:inline-block;font-weight:700;margin:1px 0;}
.my-end{font-size:9px;color:var(--text3);}
.my-rest{font-size:10px;font-weight:700;color:var(--amber);}
.my-otro{font-size:9px;color:var(--blue-t);font-weight:700;}

/* SOLICITAR DESCANSO */
.sol-form{background:var(--surface);border:1px solid var(--bg3);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
.sol-form h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;}

/* NOTIF BADGE */
.notif-badge{background:var(--accent);color:#fff;font-size:9px;font-weight:800;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:absolute;top:-4px;right:-4px;}

/* SECTION LABEL */
.sec-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}

/* ALERTS */
.alert-box{background:var(--amber-bg);border:1px solid rgba(133,106,0,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--amber);line-height:1.5;margin-bottom:12px;}
.alert-box strong{color:var(--amber);}

/* SUGERIR */
.suggest-btn{width:100%;padding:13px;background:#FFF0E6;border:1px solid rgba(232,114,12,.25);border-radius:12px;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:14px;transition:all .15s;}
.suggest-btn:hover{background:rgba(255,145,0,.18);}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .3s ease both;}

/* ══ OVERRIDE MODERNO COMPLETO - HORARIOS ══ */

*, body { font-family: 'DM Sans', sans-serif !important; }

/* LOGIN */
#sc-login { background: var(--bg) !important; flex-direction: column !important; }
.login-wrap { padding: 0 !important; }
.login-card { background: var(--surface) !important; border-color: var(--bg3) !important; box-shadow: var(--shadow) !important; margin: 16px !important; }
.login-card h2 { color: var(--text) !important; font-family: 'DM Sans', sans-serif !important; }
.field label { color: var(--text2) !important; }
.field select, .field input { background: var(--surface) !important; border-color: var(--bg3) !important; color: var(--text) !important; }
.field select option { background: #fff !important; color: var(--text) !important; }
.btn-primary { background: var(--accent) !important; color: #fff !important; font-family: 'DM Sans', sans-serif !important; font-weight: 700 !important; box-shadow: 0 4px 14px rgba(232,114,12,.3) !important; }
.btn-secondary { color: var(--text3) !important; border-color: var(--bg3) !important; }
.btn-secondary:hover { border-color: var(--accent) !important; color: var(--accent) !important; }
#login-err { color: var(--red) !important; }

/* APP SHELL */
.app-header { background: var(--surface) !important; border-color: var(--bg3) !important; box-shadow: var(--shadow) !important; }
.app-hdr-title { font-family: 'DM Serif Display', serif !important; color: var(--brand) !important; font-weight: 400 !important; }
.app-hdr-sub { color: var(--text3) !important; }
.hdr-avatar { background: var(--brand) !important; color: #fff !important; }
.hdr-btn { background: var(--bg2) !important; border-color: var(--bg3) !important; }
.hdr-btn svg { stroke: var(--text2) !important; }
.app-body { background: var(--bg) !important; }
.bottom-nav { background: var(--surface) !important; border-color: var(--bg3) !important; }
.bn.active svg { stroke: var(--accent) !important; }
.bn:not(.active) svg { stroke: var(--text3) !important; }
.bn.active .bn-lbl { color: var(--accent) !important; }
.bn:not(.active) .bn-lbl { color: var(--text3) !important; }

/* WEEK NAV */
.week-nav-btn { background: var(--surface) !important; border-color: var(--bg3) !important; }
.week-nav-btn svg { stroke: var(--text2) !important; }
.week-label { color: var(--text) !important; }
.week-pub-btn { background: var(--green-bg) !important; color: var(--green) !important; border-color: rgba(45,106,79,.2) !important; }
.week-pub-btn.published { background: var(--bg2) !important; color: var(--text3) !important; border-color: var(--bg3) !important; }

/* PUNTO TABS */
.punto-tab.active { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }
.punto-tab:not(.active) { background: var(--surface) !important; border-color: var(--bg3) !important; color: var(--text3) !important; }
.punto-tab-name { color: inherit !important; }

/* SECTION LABEL */
.sec-lbl { color: var(--text3) !important; }

/* EMPLOYEE CARDS */
.emp-card { background: var(--surface) !important; border-color: var(--bg3) !important; box-shadow: var(--shadow) !important; }
.emp-avatar { background: var(--brand) !important; color: #fff !important; }
.emp-name { color: var(--brand) !important; font-weight: 800 !important; }
.emp-meta { color: var(--text3) !important; }
.emp-punto-btn { background: var(--bg2) !important; border-color: var(--bg3) !important; color: var(--text3) !important; }
.emp-punto-btn.active-punto { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }

/* SCHEDULE GRID - LO MÁS IMPORTANTE */
.sched-grid { border-color: var(--bg3) !important; }
.sched-day-name { color: var(--text3) !important; }
.sched-day-cell { background: var(--surface2) !important; border-color: var(--bg3) !important; }
.sched-day-cell:hover { border-color: var(--accent) !important; }
.sched-day-cell.descanso { background: var(--amber-bg) !important; border-color: rgba(133,106,0,.2) !important; }
.sched-day-cell.otro-punto { background: var(--blue-bg) !important; border-color: rgba(26,82,118,.2) !important; }
.cell-start { color: var(--text) !important; font-weight: 700 !important; }
.cell-pico { color: var(--accent) !important; background: var(--amber-bg) !important; }
.cell-end { color: var(--text3) !important; }
.cell-tag { color: var(--accent) !important; font-weight: 700 !important; }
.cell-otro { color: var(--blue) !important; font-weight: 700 !important; }

/* DAY DOTS */
.day-dot { background: var(--accent) !important; color: #fff !important; }
.day-dot.empty { background: var(--bg3) !important; color: var(--text3) !important; }
.day-dot.descanso { background: var(--amber-bg) !important; color: var(--amber) !important; }
.day-dot.otro { background: var(--blue-bg) !important; color: var(--blue) !important; }

/* MI HORARIO */
.my-week { background: var(--surface) !important; border-color: var(--bg3) !important; box-shadow: var(--shadow) !important; }
.my-week-head { background: var(--brand) !important; }
.my-week-title { color: #FDF6EE !important; font-family: 'DM Serif Display', serif !important; }
.my-day { border-color: var(--bg3) !important; }
.my-day-name { color: var(--text3) !important; }
.my-day.descanso { background: var(--amber-bg) !important; }
.my-day.today { background: #FFF0E6 !important; border-bottom-color: var(--accent) !important; }
.my-time { color: var(--text) !important; font-weight: 700 !important; }
.my-pico { color: #fff !important; background: var(--accent) !important; }
.my-end { color: var(--text3) !important; }
.my-rest { color: var(--amber) !important; font-weight: 700 !important; }
.my-otro { color: var(--blue) !important; font-weight: 700 !important; }

/* SOLICITUDES */
.sol-card { background: var(--surface) !important; border-color: var(--bg3) !important; box-shadow: var(--shadow) !important; }
.sol-name { color: var(--text) !important; font-weight: 700 !important; }
.sol-date { color: var(--text3) !important; }
.sol-msg { color: var(--text2) !important; }
.sol-btn-ok { background: var(--green-bg) !important; color: var(--green) !important; border-color: rgba(45,106,79,.2) !important; }
.sol-btn-no { background: var(--red-bg) !important; color: var(--red) !important; border-color: rgba(192,57,43,.2) !important; }
.sol-ok { background: var(--green-bg) !important; color: var(--green) !important; }
.sol-no { background: var(--red-bg) !important; color: var(--red) !important; }
.sol-pend { background: var(--amber-bg) !important; color: var(--amber) !important; }

/* SOLICITAR DESCANSO */
.sol-form { background: var(--surface) !important; border-color: var(--bg3) !important; box-shadow: var(--shadow) !important; }
.sol-form h3 { color: var(--text) !important; }
.sol-form .field label { color: var(--text2) !important; }

/* MODAL */
.modal-overlay { background: rgba(26,15,10,.6) !important; backdrop-filter: blur(4px) !important; }
.modal-box { background: var(--surface) !important; }
.modal-title { color: var(--text) !important; font-weight: 700 !important; }
.modal-sub { color: var(--text3) !important; }
.modal-opt { background: var(--bg2) !important; }
.modal-opt:hover { border-color: var(--accent) !important; }
.modal-opt.selected { border-color: var(--accent) !important; background: #FFF0E6 !important; }
.modal-opt-title { color: var(--text) !important; font-weight: 700 !important; }
.modal-opt-sub { color: var(--text3) !important; }
.modal-row label { color: var(--text2) !important; }
.modal-row input, .modal-row select { background: var(--bg) !important; border-color: var(--bg3) !important; color: var(--text) !important; }
.modal-row select option { background: #fff !important; color: var(--text) !important; }
.mbtn-ok { background: var(--accent) !important; color: #fff !important; font-family: 'DM Sans', sans-serif !important; font-weight: 700 !important; }
.mbtn-cancel { background: var(--bg2) !important; color: var(--text2) !important; border-color: var(--bg3) !important; }

/* BADGES */
.area-badge { font-family: 'DM Sans', sans-serif !important; }

/* NOTIF BADGE */
.notif-badge { background: var(--accent) !important; color: #fff !important; }

/* ALERTS */
.alert-box { background: var(--amber-bg) !important; border-color: rgba(133,106,0,.2) !important; color: var(--amber) !important; }
.alert-box strong { color: var(--amber) !important; }

/* SUGGEST BTN */
.suggest-btn { background: #FFF0E6 !important; color: var(--accent) !important; border-color: rgba(232,114,12,.25) !important; font-family: 'DM Sans', sans-serif !important; }
.suggest-btn:hover { background: rgba(232,114,12,.15) !important; }

/* PERSONAL SCREEN */
.pers-card { background: var(--surface) !important; border-color: var(--bg3) !important; box-shadow: var(--shadow) !important; }
.pers-nombre { color: var(--text) !important; font-weight: 700 !important; }
.pers-meta { color: var(--text3) !important; }
.pers-btn { background: var(--accent) !important; color: #fff !important; border: none !important; }

/* PIN INPUT */
input[type=tel] { 
  background: var(--surface) !important; 
  border-color: var(--bg3) !important; 
  color: var(--text) !important; 
  letter-spacing: 6px !important;
}

/* General select/input */
select, input { color: var(--text) !important; }
select option { background: #fff !important; color: var(--text) !important; }

/* ══ END OVERRIDE ══ */

</style>
</head>

// ═══════════════════════════════════════════════════
function getWeekStart(offset=0){
  const now = new Date();
  const day = now.getDay();
  const diff = (day===0?-6:1-day); // lunes
  const mon = new Date(now);
  mon.setDate(now.getDate()+diff+(offset*7));
  mon.setHours(0,0,0,0);
  return mon;
}

function weekKey(offset=0){
  const d = getWeekStart(offset);
  return d.toISOString().slice(0,10);
}

function weekLabel(offset=0){
  const mon = getWeekStart(offset);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt=(d)=>`${d.getDate()} ${['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][d.getMonth()]}`;
  const labels=['Esta semana','Semana pasada','Hace 2 semanas'];
  if(offset===0) return `${fmt(mon)} – ${fmt(sun)} · Esta semana`;
  if(offset===-1) return `${fmt(mon)} – ${fmt(sun)} · Semana pasada`;
  return `${fmt(mon)} – ${fmt(sun)}`;
}

function getDayDates(offset=0){
  const mon = getWeekStart(offset);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

function isToday(date){
  const now=new Date();
  return date.getDate()===now.getDate()&&date.getMonth()===now.getMonth()&&date.getFullYear()===now.getFullYear();
}

async function loadHorario(wk){
  try{
    const doc = await _db.collection('horarios').doc(wk).get();
    if(doc.exists){
      const data = doc.data();
      // Si un empleado no tiene _punto, inferirlo del tipo de sus días
      // o del punto base en PERSONAL
      Object.entries(data).forEach(([nombre, turno])=>{
        if(nombre.startsWith('_') || !Array.isArray(turno)) return;
        if(!turno._punto){
          // Ver si hay días tipo 'soacha' — si la mayoría es soacha, asignar soacha
          const diasSoacha = turno.filter(d=>d.tipo==='soacha').length;
          const diasTrabajo = turno.filter(d=>d.tipo==='trabajo').length;
          if(diasSoacha > diasTrabajo){
            turno._punto = 'soacha';
          } else {
            // Usar punto base del personal si existe
            turno._punto = PERSONAL[nombre]?.punto || 'hogares';
          }
        }
      });
      horarios[wk]=data;
    }
    else horarios[wk]={};
  }catch(e){ horarios[wk]=horarios[wk]||{}; }
}

async function saveHorario(wk){
  try{ await _db.collection('horarios').doc(wk).set(horarios[wk]||{}); }
  catch(e){ console.warn('save error',e); }
}

async function loadSolicitudes(){
  try{
    const snap = await _db.collection('solicitudes_descanso').orderBy('ts','desc').limit(50).get();
    solicitudes=[];
    snap.forEach(d=>solicitudes.push({id:d.id,...d.data()}));
  }catch(e){ solicitudes=[]; }
}

async function saveSolicitud(data){

}

// SUGERENCIA AUTOMÁTICA
// ═══════════════════════════════════════════════════
async function sugerirHorario(wk){
  if(!confirm('¿Generar horario sugerido para esta semana?\n\nSe respetarán las solicitudes de descanso aprobadas. Podrás ajustar todo antes de publicar.')) return;

  await loadSolicitudes();
  if(!horarios[wk]) horarios[wk]={};

  const sol_aprobadas = solicitudes.filter(s=>s.estado==='aprobada'&&s.semana===wk);

  // Para cada empleado generar turno
  Object.entries(PERSONAL).forEach(([nombre,info])=>{
    const turno = defaultTurno(nombre);

    // Ver si tiene solicitud aprobada esta semana
    const sol = sol_aprobadas.find(s=>s.nombre===nombre);
    let diaDescanso = -1;

    if(sol){
      // Usar el día solicitado
      diaDescanso = parseInt(sol.dia_idx);
    } else {
      // Rotar descanso: usar semana anterior como referencia
      const prevWk = weekKey(curWeekOffset-1);
      const prev = horarios[prevWk]?.[nombre];
      if(prev){
        const prevDesc = prev.findIndex(d=>d.tipo==='descanso');
        diaDescanso = prevDesc>=0 ? (prevDesc+1)%7 : 0;
      } else {
        // Asignar lunes por defecto
        diaDescanso = 0;
      }
    }

    // Aplicar descanso
    if(diaDescanso>=0) turno[diaDescanso]={tipo:'descanso',entrada:'',pico_ini:'',pico_fin:'',cierre:''};

    // Horarios según día
    turno.forEach((d,i)=>{
      if(d.tipo==='descanso') return;
      const esFinDeSemana = i>=4; // Vie, Sáb, Dom
      const esSab = i===5;
      const esDom = i===6;
      d.entrada = esSab||esDom?'13:00':'13:00';
      d.cierre = esFinDeSemana?'23:00':'22:00';
      d.pico_ini = esFinDeSemana?'17:00':'16:00';
      d.pico_fin = esFinDeSemana?'20:00':'19:00';
    });

    horarios[wk][nombre]=turno;
  });

  await saveHorario(wk);
  alert('✅ Horario sugerido generado.\n\nRevisa y ajusta lo que necesites antes de publicar.');
  renderEncHorario();
}

// DETECTAR CONFLICTOS
// ═══════════════════════════════════════════════════
function detectarConflictos(wk){
  const h=horarios[wk]||{};
  const conflicts=[];

  // Por área y punto, no más de 1 descanso el mismo día
  const areas=['cocina','recepcion','domiciliarios'];
  const puntos=['hogares','soacha'];

  puntos.forEach(punto=>{
    areas.forEach(area=>{
      const emps=Object.entries(PERSONAL).filter(([n,p])=>p.area===area);
      DIAS.forEach((d,i)=>{
        const enDescanso=emps.filter(([n])=>{
          const turno=h[n]||defaultTurno(n);
          return turno[i]?.tipo==='descanso';
        });
        if(enDescanso.length>1){
          conflicts.push(`${d}: ${enDescanso.map(([n])=>n).join(' y ')} descansan al mismo tiempo (${area})`);
        }
      });
    });
  });

  return conflicts;
}

async function loadPersonalDB(){
  try {
    const snap = await _db.collection('personal').get();
    if(!snap.empty){
      snap.forEach(doc=>{
        const fbNombre = doc.id;
        const fbLower = fbNombre.toLowerCase();
        // Eliminar duplicado hardcodeado con diferente capitalización
        Object.keys(PERSONAL).forEach(hc=>{
          if(hc.toLowerCase()===fbLower && hc!==fbNombre) delete PERSONAL[hc];
        });
        PERSONAL[fbNombre] = Object.assign({}, PERSONAL[fbNombre]||{}, doc.data());
      });
    } else {
      // Primera vez — guardar los hardcodeados en Firebase
      const batch = _db.batch();
      Object.entries(PERSONAL).forEach(([nombre,info])=>{
        batch.set(_db.collection('personal').doc(nombre), info);
      });
      await batch.commit();
    }
  } catch(e){ console.warn('loadPersonal error',e); }
}

async function savePersonaDB(nombre, data){
  try { await _db.collection('personal').doc(nombre).set(data); }
  catch(e){ console.warn('savePersona error',e); }
}

async function deletePersonaDB(nombre){
  try { await _db.collection('personal').doc(nombre).delete(); }
  catch(e){ console.warn('deletePersona error',e); }
}

      } else if(dia.tipo==='soacha'){
        html+=`<div class="my-otro">🏬<br>SOA</div>`;
      } else {
        if(dia.pico_ini){
          // Turno partido estilo Excel: 1:00pm (4pm-7pm) 11:00pm
          html+=`<div class="my-time">${dia.entrada||'—'}</div>`;
          html+=`<div class="my-pico">(${dia.pico_ini}–${dia.pico_fin})</div>`;
          html+=`<div class="my-end">${dia.cierre||''}</div>`;
        } else {
          html+=`<div class="my-time">${dia.entrada||'—'}</div>`;
          html+=`<div class="my-end">${dia.cierre||''}</div>`;
        }
      }
      html+=`</div></div>`;
    });

    html+=`</div></div>`;

    // Turno de hoy destacado
    const todayIdx=new Date().getDay();
    const monIdx=(todayIdx===0?6:todayIdx-1);

        html+=`<div style="font-family:'Poppins',sans-serif;font-size:20px;font-weight:800;color:var(--naranja);">🟡 Día de descanso</div>`;
      } else if(hoy.tipo==='hogares'||hoy.tipo==='soacha'){
        html+=`<div style="font-family:'Poppins',sans-serif;font-size:16px;font-weight:800;color:var(--blue-t);">${hoy.tipo==='hogares'?'🏠 Trabajas en Hogares':'🏬 Trabajas en Soacha'}</div>`;
        html+=`<div style="font-size:13px;color:rgba(254,242,223,.6);margin-top:4px;">${hoy.entrada||''} — ${hoy.cierre||''}</div>`;
      } else if(hoy.pico_ini){
        html+=`<div style="font-family:'Poppins',sans-serif;font-size:22px;font-weight:900;color:var(--crema);">${hoy.entrada} – ${hoy.pico_ini}</div>`;
        html+=`<div style="font-size:12px;color:rgba(254,242,223,.4);margin:5px 0 3px;letter-spacing:.3px;">↩ REGRESA A LAS ${hoy.pico_fin}</div>`;
        html+=`<div style="font-family:'Poppins',sans-serif;font-size:22px;font-weight:900;color:var(--crema);">${hoy.pico_fin} – ${hoy.cierre}</div>`;
        html+=`<div style="font-size:10px;color:rgba(254,242,223,.25);margin-top:5px;text-transform:uppercase;letter-spacing:.5px;">Turno partido</div>`;
      } else {
        html+=`<div style="font-family:'Poppins',sans-serif;font-size:26px;font-weight:900;color:var(--crema);">${hoy.entrada||'—'} – ${hoy.cierre||''}</div>`;
      }
      html+=`</div>`;
    }

  // Semana próxima

  const turnoNext=hNext[curUser]||null;
  html+=`<div class="sec-lbl fade-up" style="margin-top:4px;">Próxima semana — ${weekLabel(1)}</div>`;
  if(!isNextPublished||!turnoNext){
    html+=`<div style="font-size:12px;color:rgba(254,242,223,.35);padding:12px 0;" class="fade-up">Aún no publicado</div>`;

    const diasNext=getDayDates(1);
    html+=`<div class="my-week fade-up">
      <div class="my-week-head"><div class="my-week-title">${weekLabel(1).split('·')[0].trim()}</div></div>
      <div class="my-days">`;
    turnoNext.forEach((dia,i)=>{
      html+=`<div class="my-day ${dia.tipo==='descanso'?'descanso':''}">
        <div class="my-day-name">${DIAS[i]}</div><div class="my-day-content">`;
      if(dia.tipo==='descanso') html+=`<div class="my-rest">DESC</div>`;
      else if(dia.tipo==='hogares') html+=`<div class="my-otro">HOG</div>`;
      else if(dia.tipo==='soacha') html+=`<div class="my-otro">SOA</div>`;
      else {
        html+=`<div class="my-time">${dia.entrada||'—'}</div>`;
        if(dia.pico_ini) html+=`<div class="my-pico">(${dia.pico_ini}–${dia.pico_fin})</div>`;
        html+=`<div class="my-end">${dia.cierre||''}</div>`;
      }
      html+=`</div></div>`;
    });
    html+=`</div></div>`;
  }

  body.innerHTML=html;
}

let calMes = 0; // offset de mes (0 = este mes, 1 = siguiente)
let calFechaSeleccionada = null;

async function renderEmpPedir(){
  await loadSolicitudes();

      html += `<div class="sol-card fade-up">
        <div class="sol-head">
          <div class="sol-name">${formatFechaLarga(s.fecha)||s.semana}</div>

function renderCalendario(){
  const hoy = new Date();
  hoy.setHours(0,0,0,0);
  const minFecha = new Date(hoy);
  minFecha.setDate(hoy.getDate()+1); // mínimo mañana
  const maxFecha = new Date(hoy);
  maxFecha.setDate(hoy.getDate()+35); // máximo 35 días

  const mes = new Date(hoy.getFullYear(), hoy.getMonth()+calMes, 1);
  const mesNombre = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][mes.getMonth()];
  const diasEnMes = new Date(mes.getFullYear(), mes.getMonth()+1, 0).getDate();
  const primerDia = mes.getDay(); // 0=dom
  const primerDiaLun = primerDia===0?6:primerDia-1; // ajustar a lunes=0

  // Fechas con solicitud ya enviada
  const fechasOcupadas = new Set(solicitudes.filter(s=>s.nombre===curUser&&s.estado!=='rechazada').map(s=>s.fecha));

  let html = `<div style="background:rgba(254,242,223,.05);border:1px solid var(--border);border-radius:14px;overflow:hidden;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(254,242,223,.06);">
      <button onclick="cambiarMesCal(-1)" style="width:28px;height:28px;border-radius:8px;background:rgba(254,242,223,.08);border:1px solid var(--border);color:var(--crema);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;"
        ${calMes<=0?'disabled style="opacity:.3;cursor:default;"':''}>‹</button>
      <div style="font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;color:var(--crema);">${mesNombre} ${mes.getFullYear()}</div>
      <button onclick="cambiarMesCal(1)" style="width:28px;height:28px;border-radius:8px;background:rgba(254,242,223,.08);border:1px solid var(--border);color:var(--crema);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;"
        ${calMes>=1?'disabled style="opacity:.3;cursor:default;"':''}>›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);padding:8px;">`;

  // Cabeceras días
  ['L','M','M','J','V','S','D'].forEach((d,i)=>{
    html+=`<div style="text-align:center;font-size:9px;font-weight:700;color:rgba(254,242,223,.3);padding:4px 0;font-family:'Poppins',sans-serif;">${d}</div>`;
  });

  // Celdas vacías inicio
  for(let i=0;i<primerDiaLun;i++){
    html+=`<div></div>`;
  }

  // Días del mes
  for(let d=1;d<=diasEnMes;d++){
    const fecha = new Date(mes.getFullYear(), mes.getMonth(), d);
    fecha.setHours(0,0,0,0);
    const fechaStr = fecha.toISOString().slice(0,10);
    const esHoy = fecha.getTime()===hoy.getTime();
    const esSel = calFechaSeleccionada===fechaStr;
    const esPasado = fecha < minFecha;
    const esFuturoLejano = fecha > maxFecha;
    const tienesSol = fechasOcupadas.has(fechaStr);
    const bloqueado = esPasado||esFuturoLejano||tienesSol;
    const esFinSem = fecha.getDay()===0||fecha.getDay()===6;

    let bg, color, border;
    if(esSel){ bg='var(--naranja)';color='var(--cafe)';border='none'; }
    else if(tienesSol){ bg='rgba(59,109,17,.2)';color='var(--green-t)';border='1px solid rgba(59,109,17,.3)'; }
    else if(bloqueado){ bg='transparent';color='rgba(254,242,223,.2)';border='none'; }
    else if(esHoy){ bg='rgba(254,242,223,.1)';color='var(--crema)';border='1px solid rgba(254,242,223,.3)'; }
    else if(esFinSem){ bg='rgba(255,145,0,.07)';color='var(--naranja)';border='1px solid transparent'; }
    else{ bg='rgba(254,242,223,.04)';color='var(--crema)';border='1px solid transparent'; }

    html+=`<div style="text-align:center;padding:3px 2px;">
      <div onclick="${bloqueado?'':(`selFecha('${fechaStr}')`)}"
        style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;
               font-family:'Poppins',sans-serif;font-size:12px;font-weight:${esSel||esHoy?700:500};
               background:${bg};color:${color};border:${border};
               cursor:${bloqueado?'default':'pointer'};transition:all .12s;">
        ${d}${tienesSol?'<span style="position:absolute;font-size:6px;">●</span>':''}
      </div>
    </div>`;
  }

  html+=`</div></div>`;
  return html;
}

function cambiarMesCal(dir){
  calMes = Math.max(0, Math.min(1, calMes+dir));
  renderEmpPedir();
}

function selFecha(fechaStr){
  calFechaSeleccionada = fechaStr;
  renderEmpPedir();
}

function formatFechaLarga(fechaStr){
  if(!fechaStr) return '';
  try{
    const d = new Date(fechaStr+'T12:00:00');
    const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]}`;
  }catch(e){ return fechaStr; }
}


async function enviarSolicitud(){
  if(!calFechaSeleccionada){ alert('Selecciona una fecha en el calendario'); return; }
  const motivo = document.getElementById('sol-motivo')?.value.trim()||'';

  // Calcular semana y día de la semana
  const fecha = new Date(calFechaSeleccionada+'T12:00:00');
  const day = fecha.getDay();
  const dia_idx = day===0?6:day-1; // lunes=0
  // Obtener lunes de esa semana
  const mon = new Date(fecha);
  mon.setDate(fecha.getDate()-(dia_idx));
  const semana = mon.toISOString().slice(0,10);

  const yaExiste = solicitudes.find(s=>s.nombre===curUser&&s.fecha===calFechaSeleccionada&&s.estado==='pendiente');
  if(yaExiste){ alert('Ya tienes una solicitud pendiente para esa fecha'); return; }

  await saveSolicitud({nombre:curUser, fecha:calFechaSeleccionada, semana, dia_idx, motivo, estado:'pendiente'});
  calFechaSeleccionada = null;
  alert(`✅ Solicitud enviada para el ${formatFechaLarga(calFechaSeleccionada||semana)}. La encargada la revisará pronto.`);
  await renderEmpPedir();
}
