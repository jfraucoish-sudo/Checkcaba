<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckResto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* ── MARCA ── */
  --crema:#FEF2DF;
  --espresso:#2D1B15;
  --espresso-med:#4A2E24;
  --espresso-soft:rgba(45,27,21,0.08);
  --naranja:#FF9100;
  --naranja-l:#FFF0DC;
  --naranja-d:#CC7300;

  /* ── SEMÁNTICOS (mantenidos para lógica interna) ── */
  --coral:#D85A30;--coral-l:#FAECE7;--coral-d:#712B13;
  --purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;
  --green:#3B6D11;--green-l:#EAF3DE;
  --amber:#BA7517;--amber-l:#FAEEDA;
  --blue:#185FA5;--blue-l:#E6F1FB;
  --teal:#0F6E56;--teal-l:#E1F5EE;--teal-d:#085041;
  --red:#A32D2D;--red-l:#FCEBEB;

  /* ── SISTEMA UI ── */
  --bg:var(--crema);
  --bg2:#F5E8CC;
  --bg3:#EDD9B2;
  --txt:var(--espresso);
  --txt2:var(--espresso-med);
  --txt3:rgba(45,27,21,0.45);
  --border:rgba(45,27,21,0.12);
  --border2:rgba(45,27,21,0.22);
  --r:14px;--rsm:8px;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--crema);
  color:var(--txt);
  font-size:14px;
  min-height:100vh;
}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;}
.screen.active{display:block;}

/* ══════════════════════════════════════════
   LOGIN
══════════════════════════════════════════ */
.login-wrap{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;
  padding:2rem 1.5rem;
  background:var(--crema);
}

/* Reloj / fecha en login */
.login-clock{
  text-align:center;margin-bottom:1.8rem;
  animation:fadeUp .5s ease both;
}
.login-clock .clock-time{
  font-family:'Poppins',sans-serif;
  font-size:42px;font-weight:700;
  color:var(--espresso);
  letter-spacing:-1px;
  line-height:1;
}
.login-clock .clock-date{
  font-size:13px;font-weight:500;
  color:var(--txt2);margin-top:4px;
  text-transform:capitalize;
}

.login-logo{
  width:60px;height:60px;
  background:var(--espresso);
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:1rem;
  box-shadow:0 8px 24px rgba(45,27,21,0.25);
  animation:fadeUp .4s .1s ease both;
}
.login-logo svg{width:30px;height:30px;fill:var(--naranja);}
.login-title{
  font-family:'Poppins',sans-serif;
  font-size:26px;font-weight:800;
  letter-spacing:-.5px;margin-bottom:.25rem;
  color:var(--espresso);
  animation:fadeUp .4s .15s ease both;
}
.login-sub{
  font-size:13px;color:var(--txt2);
  margin-bottom:1.8rem;text-align:center;
  animation:fadeUp .4s .2s ease both;
}

.punto-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;width:100%;max-width:380px;margin-bottom:1.5rem;
  animation:fadeUp .4s .25s ease both;
}
.punto-card{
  background:var(--espresso);
  border:2px solid var(--espresso);
  border-radius:var(--r);padding:22px 16px;
  text-align:center;cursor:pointer;
  transition:all .2s;
  min-height:90px;
}
.punto-card:hover{
  background:var(--espresso-med);
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(45,27,21,0.2);
}
.punto-card.selected{
  background:var(--naranja);
  border-color:var(--naranja);
}
.punto-card .pc-icon{font-size:26px;margin-bottom:7px;}
.punto-card .pc-name{font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;color:var(--crema);}
.punto-card.selected .pc-name{color:var(--espresso);}
.punto-card .pc-sub{font-size:11px;color:rgba(254,242,223,0.65);margin-top:2px;}
.punto-card.selected .pc-sub{color:rgba(45,27,21,0.65);}

.login-name-wrap{
  width:100%;max-width:380px;margin-bottom:1rem;
  animation:fadeUp .4s .3s ease both;
}
.login-name-wrap label{
  font-size:11px;font-weight:600;
  color:var(--txt2);display:block;
  margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;
}
.login-name-wrap input{
  width:100%;padding:13px 15px;
  border:1.5px solid var(--border2);
  border-radius:var(--r);font-size:15px;
  background:white;color:var(--txt);outline:none;
  font-family:'Inter',sans-serif;
  transition:border-color .15s,box-shadow .15s;
}
.login-name-wrap input:focus{
  border-color:var(--naranja);
  box-shadow:0 0 0 3px rgba(255,145,0,.15);
}

.login-btn{
  width:100%;max-width:380px;padding:15px;
  background:var(--naranja);
  color:var(--espresso);
  font-family:'Poppins',sans-serif;
  font-size:15px;font-weight:700;
  border:none;border-radius:var(--r);
  cursor:pointer;
  transition:all .2s;
  letter-spacing:.01em;
  animation:fadeUp .4s .35s ease both;
  box-shadow:0 4px 16px rgba(255,145,0,.35);
}
.login-btn:hover{
  background:var(--naranja-d);
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(255,145,0,.45);
}
.login-btn:active{transform:translateY(0);}
.admin-link{
  margin-top:1.2rem;font-size:12px;
  color:var(--txt3);cursor:pointer;
  text-decoration:underline;
}

/* ══════════════════════════════════════════
   APP HEADER
══════════════════════════════════════════ */
.app-header{
  background:var(--espresso);
  border-bottom:none;
  padding:13px 16px;
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-logo{
  width:34px;height:34px;
  background:var(--naranja);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}
.hdr-logo svg{width:17px;height:17px;fill:var(--espresso);}
.hdr-title{
  font-family:'Poppins',sans-serif;
  font-size:14px;font-weight:700;
  color:var(--crema);
}
.hdr-sub{font-size:11px;color:rgba(254,242,223,0.55);}
.hdr-right{display:flex;gap:7px;align-items:center;}
.hdr-btn{
  width:34px;height:34px;
  border:1.5px solid rgba(254,242,223,0.2);
  border-radius:var(--rsm);
  background:rgba(254,242,223,0.08);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  color:var(--crema);
}
.hdr-btn svg{stroke:var(--crema);}
.hdr-notif{
  position:absolute;top:4px;right:4px;
  width:7px;height:7px;background:#FF4545;
  border-radius:50%;border:1.5px solid var(--espresso);
}
.punto-badge{
  font-size:11px;padding:4px 10px;
  border-radius:20px;font-weight:600;
  background:var(--naranja);
  color:var(--espresso);
  font-family:'Poppins',sans-serif;
}

/* ── Reloj en header app ── */
.hdr-clock{
  font-size:12px;font-weight:600;
  color:rgba(254,242,223,0.75);
  font-family:'Inter',sans-serif;
  white-space:nowrap;
}

/* ══════════════════════════════════════════
   BOTTOM NAV
══════════════════════════════════════════ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--espresso);
  border-top:none;
  display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom);
}
.bn-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:10px 4px;cursor:pointer;
  color:rgba(254,242,223,0.4);
  transition:color .15s;
  min-height:56px;
}
.bn-item.active{color:var(--naranja);}
.bn-item svg{width:22px;height:22px;stroke:currentColor;}
.bn-label{font-size:10px;margin-top:3px;font-weight:500;font-family:'Inter',sans-serif;}

/* ══════════════════════════════════════════
   CONTENT
══════════════════════════════════════════ */
.page-content{padding-bottom:80px;}

/* ══════════════════════════════════════════
   TABS DE ÁREA
══════════════════════════════════════════ */
.area-scroll{
  overflow-x:auto;
  background:var(--espresso);
  border-bottom:1px solid rgba(254,242,223,0.1);
  padding:0 16px;display:flex;gap:0;scrollbar-width:none;
}
.area-scroll::-webkit-scrollbar{display:none;}
.area-tab{
  padding:11px 14px;font-size:12px;font-weight:500;
  color:rgba(254,242,223,0.45);white-space:nowrap;
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;font-family:'Inter',sans-serif;
}
.area-tab.active{color:var(--naranja);border-bottom-color:var(--naranja);}

.turno-bar{
  padding:10px 16px;display:flex;gap:7px;
  overflow-x:auto;background:var(--bg2);
  scrollbar-width:none;
  border-bottom:1px solid var(--border);
}
.turno-bar::-webkit-scrollbar{display:none;}
.turno-chip{
  padding:7px 15px;font-size:12px;
  border:1.5px solid var(--border2);
  border-radius:20px;cursor:pointer;
  white-space:nowrap;background:var(--crema);
  color:var(--txt2);transition:all .15s;
  font-weight:500;min-height:34px;
}
.turno-chip.active{
  background:var(--naranja);
  color:var(--espresso);
  border-color:var(--naranja);
  font-weight:700;
}

/* ══════════════════════════════════════════
   PROGRESS
══════════════════════════════════════════ */
.prog-wrap{
  margin:10px 16px;
  background:var(--espresso);
  border:none;
  border-radius:var(--r);padding:13px 15px;
}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-label{font-size:12px;color:rgba(254,242,223,0.6);}
.prog-pct{font-size:13px;font-weight:700;color:var(--naranja);font-family:'Poppins',sans-serif;}
.prog-track{height:5px;background:rgba(254,242,223,0.1);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:var(--naranja);transition:width .5s;}

/* ══════════════════════════════════════════
   CARDS DE TAREA
══════════════════════════════════════════ */
.sec-lbl{
  font-size:10px;font-weight:600;
  color:var(--txt3);text-transform:uppercase;
  letter-spacing:.08em;padding:0 16px;margin:14px 0 6px;
  font-family:'Inter',sans-serif;
}
.task-card{
  margin:0 16px 8px;
  background:white;
  border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  box-shadow:0 1px 4px rgba(45,27,21,0.06);
}
.task-main{display:flex;align-items:flex-start;gap:11px;padding:12px 14px;}
.chk{
  width:22px;height:22px;
  border:2px solid var(--border2);
  border-radius:6px;flex-shrink:0;
  cursor:pointer;display:flex;
  align-items:center;justify-content:center;
  margin-top:1px;transition:all .15s;
}
.chk.done{background:var(--green);border-color:var(--green);}
.task-body{flex:1;min-width:0;}
.task-name{font-size:13px;color:var(--txt);line-height:1.45;}
.task-name.done{text-decoration:line-through;color:var(--txt3);}
.task-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;}
.b-crit{background:var(--naranja-l);color:var(--naranja-d);}
.b-temp{background:var(--blue-l);color:var(--blue);}
.b-aseo{background:var(--green-l);color:var(--green);}
.b-dinero{background:var(--purple-l);color:var(--purple-d);}
.b-rot{background:var(--amber-l);color:var(--amber);}
.b-freq{background:var(--blue-l);color:var(--blue);}
.task-extra{padding:8px 14px 13px;}
.field-row{display:flex;align-items:center;gap:8px;margin-top:7px;}
.field-label{font-size:12px;color:var(--txt2);}
input[type=number],input[type=text],textarea,select{
  font-size:13px;border:1.5px solid var(--border);
  border-radius:var(--rsm);background:white;
  color:var(--txt);outline:none;
  font-family:'Inter',sans-serif;
}
input[type=number],input[type=text]{padding:6px 10px;}
input[type=number]:focus,input[type=text]:focus{
  border-color:var(--naranja);
  box-shadow:0 0 0 3px rgba(255,145,0,.12);
}
textarea{padding:9px 11px;resize:vertical;font-family:'Inter',sans-serif;line-height:1.5;}
textarea:focus{
  border-color:var(--naranja);
  box-shadow:0 0 0 3px rgba(255,145,0,.12);
}
select{padding:5px 8px;}
.range-note{font-size:11px;color:var(--txt3);margin-top:3px;}
.temp-status{font-size:11px;padding:3px 8px;border-radius:8px;}
.ts-ok{background:var(--green-l);color:var(--green);}
.ts-warn{background:var(--red-l);color:var(--red);}
.ts-nd{background:var(--bg2);color:var(--txt3);}

/* ══════════════════════════════════════════
   ESTRELLAS
══════════════════════════════════════════ */
.stars{display:flex;gap:3px;margin-top:6px;}
.star{width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.star svg{width:22px;height:22px;fill:var(--border2);transition:fill .1s;}
.star.lit svg{fill:var(--naranja);}
.star-lbl{font-size:11px;color:var(--txt3);margin-top:2px;}

/* ══════════════════════════════════════════
   ARQUEO
══════════════════════════════════════════ */
.arqueo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px;}
.arq-cell{background:var(--bg2);border-radius:var(--rsm);padding:10px 12px;}
.arq-lbl{font-size:10px;color:var(--txt3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}
.arq-val{font-size:17px;font-weight:700;color:var(--txt);font-family:'Poppins',sans-serif;}
.arq-val.neg{color:var(--red);}
.arq-val.pos{color:var(--green);}

/* ══════════════════════════════════════════
   FIRMA / OBS
══════════════════════════════════════════ */
.obs-card{
  margin:0 16px 8px;background:white;
  border:1px solid var(--border);
  border-radius:var(--r);padding:13px;
  box-shadow:0 1px 4px rgba(45,27,21,0.05);
}
.obs-card textarea{width:100%;min-height:65px;}
.firma-card{
  margin:0 16px 8px;background:white;
  border:1px solid var(--border);
  border-radius:var(--r);padding:13px;
  box-shadow:0 1px 4px rgba(45,27,21,0.05);
}
.firma-card input{width:100%;padding:10px 12px;}
.cierre-btn{
  margin:12px 16px 16px;
  width:calc(100% - 32px);
  padding:15px;background:var(--naranja);
  color:var(--espresso);
  font-family:'Poppins',sans-serif;
  font-size:14px;font-weight:700;
  border:none;border-radius:var(--r);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 4px 16px rgba(255,145,0,.3);
  transition:all .2s;
}
.cierre-btn:hover{background:var(--naranja-d);transform:translateY(-1px);}
.signed-banner{
  margin:0 16px 8px;
  background:var(--green-l);
  border:1px solid #97C459;
  border-radius:var(--r);padding:12px 15px;
  display:flex;align-items:center;gap:9px;
}
.signed-txt{font-size:13px;color:var(--green);font-weight:600;}
.signed-sub{font-size:11px;color:var(--green);}

/* ══════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════ */
.dash-header{padding:14px 16px 0;}
.dash-title{
  font-family:'Poppins',sans-serif;
  font-size:20px;font-weight:700;letter-spacing:-.3px;
  color:var(--espresso);
}
.dash-sub{font-size:12px;color:var(--txt2);margin-top:3px;}
.dash-date-row{
  display:flex;gap:8px;padding:10px 16px;
  overflow-x:auto;scrollbar-width:none;
}
.dash-date-row::-webkit-scrollbar{display:none;}
.date-chip{
  padding:6px 14px;font-size:12px;
  border:1.5px solid var(--border2);
  border-radius:20px;cursor:pointer;
  white-space:nowrap;background:white;
  color:var(--txt2);transition:all .15s;font-weight:500;
}
.date-chip.active{
  background:var(--espresso);
  color:var(--crema);
  border-color:var(--espresso);
}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 16px;margin:4px 0;}
.kpi-card{
  background:var(--espresso);
  border:none;border-radius:var(--r);padding:14px;
  box-shadow:0 2px 8px rgba(45,27,21,0.12);
}
.kpi-label{font-size:11px;color:rgba(254,242,223,0.55);margin-bottom:5px;}
.kpi-val{
  font-family:'Poppins',sans-serif;
  font-size:24px;font-weight:700;
  color:var(--crema);
}
.kpi-sub{font-size:11px;color:rgba(254,242,223,0.45);margin-top:3px;}
.kpi-val.bad{color:#FF6B6B;}
.kpi-val.good{color:#7FD67A;}
.compare-card{
  margin:0 16px 9px;background:white;
  border:1px solid var(--border);
  border-radius:var(--r);padding:15px;
  box-shadow:0 1px 4px rgba(45,27,21,0.06);
}
.compare-title{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--espresso);}
.cmp-row{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.cmp-area{font-size:12px;color:var(--txt2);width:90px;flex-shrink:0;}
.cmp-bars{flex:1;display:flex;flex-direction:column;gap:5px;}
.cmp-bar-wrap{display:flex;align-items:center;gap:7px;}
.cmp-bar-track{flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.cmp-bar-fill{height:100%;border-radius:4px;transition:width .5s;}
.cmp-bar-lbl{font-size:10px;width:30px;text-align:right;color:var(--txt2);}
.cmp-legend{display:flex;gap:12px;margin-bottom:9px;}
.cmp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cmp-leg-lbl{font-size:11px;color:var(--txt2);}

/* ══════════════════════════════════════════
   ALERTAS DASHBOARD
══════════════════════════════════════════ */
.alert-item{margin:0 16px 8px;border-radius:var(--r);padding:12px 15px;border:1px solid;}
.alert-crit{background:#FCEBEB;border-color:#F7C1C1;}
.alert-warn{background:var(--amber-l);border-color:#FAC775;}
.alert-ok{background:var(--green-l);border-color:#97C459;}
.alert-txt{font-size:13px;line-height:1.4;}
.alert-sub{font-size:11px;margin-top:3px;}
.alert-crit .alert-txt{color:#791F1F;}
.alert-crit .alert-sub{color:#A32D2D;}
.alert-warn .alert-txt{color:#633806;}
.alert-warn .alert-sub{color:#854F0B;}
.alert-ok .alert-txt{color:var(--green);}
.wsp-btn{
  margin:4px 16px 9px;
  display:flex;align-items:center;gap:8px;
  padding:12px 15px;background:#25D366;
  color:white;border:none;border-radius:var(--r);
  cursor:pointer;font-size:13px;font-weight:600;
  width:calc(100% - 32px);
  font-family:'Poppins',sans-serif;
}
.wsp-btn svg{width:18px;height:18px;fill:white;flex-shrink:0;}

/* ══════════════════════════════════════════
   HISTORIAL
══════════════════════════════════════════ */
.hist-card{
  margin:0 16px 9px;background:white;
  border:1px solid var(--border);
  border-radius:var(--r);padding:14px;
  box-shadow:0 1px 4px rgba(45,27,21,0.06);
}
.hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.hist-title{font-size:13px;font-weight:600;font-family:'Poppins',sans-serif;color:var(--espresso);}
.hist-badge{font-size:11px;padding:3px 9px;border-radius:10px;}
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
.hist-row:last-child{border-bottom:none;}
.hist-area{font-size:12px;color:var(--txt);}
.hist-data{display:flex;align-items:center;gap:8px;}
.hist-pct{font-size:12px;font-weight:600;font-family:'Poppins',sans-serif;}
.pct-bar{width:60px;height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;}
.pct-fill{height:100%;border-radius:3px;}
.empty-dash{padding:3rem 1rem;text-align:center;color:var(--txt3);font-size:13px;}

/* ══════════════════════════════════════════
   DATÁFONOS
══════════════════════════════════════════ */
.dat-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);}
.dat-row:last-child{border-bottom:none;}
.dat-num{
  width:22px;height:22px;border-radius:50%;
  background:var(--bg2);display:flex;
  align-items:center;justify-content:center;
  font-size:11px;font-weight:600;color:var(--txt2);flex-shrink:0;
}

/* ══════════════════════════════════════════
   ANIMACIONES
══════════════════════════════════════════ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}
</style>

// PERSISTENT STORAGE (localStorage)
// ══════════════════════════════════════════════════════════════
function todayStr(){
  return new Date().toISOString().slice(0,10);
}
function saveData(punto,area,turno,data){
  const key=`cr_${punto}_${todayStr()}_${area}_${turno}`;
  localStorage.setItem(key,JSON.stringify(data));
}
function loadData(punto,area,turno){
  const key=`cr_${punto}_${todayStr()}_${area}_${turno}`;
  const d=localStorage.getItem(key);
  return d?JSON.parse(d):null;
}
function loadDataDate(punto,date,area,turno){
  const key=`cr_${punto}_${date}_${area}_${turno}`;
  const d=localStorage.getItem(key);
  return d?JSON.parse(d):null;
}
function getRecentDates(){
  const dates=new Set();
  dates.add(todayStr());
  Object.keys(localStorage).forEach(k=>{
    if(k.startsWith('cr_')){
      const p=k.split('_');
      if(p.length>=3) dates.add(p[2]);
    }
  });
  return [...dates].sort().reverse().slice(0,7);
}

let curPunto=null, curUser='', curArea='admin', curTurno='apertura';
let curTab='checklist', adminDate=todayStr();
let selPunto=null;

// Per-task state (in-memory, synced to localStorage on change)
const TS = {};
function tsk(a,t,i){return `${a}_${t}_${i}`;}
function getTS(a,t,i){
  const k=tsk(a,t,i);
  if(!TS[k]) TS[k]={done:false,val:'',aseo:0};
  return TS[k];
}
const OBS={}, FIRMA={}, SIGNED={};
const DATFONOS={};
// S = extra state for inventario, cierre_area, and other sub-keys
const S={};
function sfk(){return `${curArea}_${curTurno}`;}

function persistCurrent(){
  if(!curPunto) return;
  const tasks=(CL[curArea]||{})[curTurno]||[];
  const data={
    tasks:tasks.map((_,i)=>({...getTS(curArea,curTurno,i)})),
    obs:OBS[sfk()]||'',
    signed:SIGNED[sfk()]||null,
    datfonos:{...DATFONOS},
    extra:{...S},
  };
  saveData(curPunto,curArea,curTurno,data);
}

function loadCurrent(){
  if(!curPunto) return;
  const data=loadData(curPunto,curArea,curTurno);
  if(!data) return;
  const tasks=(CL[curArea]||{})[curTurno]||[];
  (data.tasks||[]).forEach((d,i)=>{
    if(i<tasks.length){const s=getTS(curArea,curTurno,i);s.done=d.done;s.val=d.val;s.aseo=d.aseo;}
  });
  OBS[sfk()]=data.obs||'';
  SIGNED[sfk()]=data.signed||null;
  Object.assign(DATFONOS,data.datfonos||{});
  Object.assign(S,data.extra||{});
}

// ══════════════════════════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════════════════════════
function calcProg(a,t){
  const tasks=(CL[a]||{})[t]||[];
  if(!tasks.length) return{d:0,total:0};
  let d=0;
  tasks.forEach((tk,i)=>{
    const s=getTS(a,t,i);
    if(tk.tipo==='check'&&s.done)d++;
    else if(tk.tipo==='aseo'&&s.aseo>0)d++;
    else if((tk.tipo==='temp'||tk.tipo==='dinero')&&s.val!=='')d++;
    else if(tk.tipo==='arqueo')d++;
    else if(tk.tipo==='datofonos')d++;
  });
  return{d,total:tasks.length};
}
function pct(a,t){const{d,total}=calcProg(a,t);return total?Math.round(d/total*100):0;}
function updateProg(){
  const{d,total}=calcProg(curArea,curTurno);
  const p=total?Math.round(d/total*100):0;
  const lbl=document.getElementById('prog-lbl');
  const pn=document.getElementById('prog-pct');
  const pf=document.getElementById('prog-fill');
  if(lbl)lbl.textContent=`${d} de ${total} tareas`;
  if(pn)pn.textContent=p+'%';
  if(pf)pf.style.width=p+'%';
}

function tempSt(val,rango,unit){
  unit=unit||'°C';
  if(val===''||val===null)return'<span class="temp-status ts-nd">—</span>';
  const v=parseFloat(val);
  if(isNaN(v))return'<span class="temp-status ts-nd">—</span>';
  return(v>=rango[0]&&v<=rango[1])
    ?`<span class="temp-status ts-ok">✓ OK</span>`
    :`<span class="temp-status ts-warn">⚠ Alerta</span>`;
}
function starsHtml(k,val){
  return[1,2,3,4,5].map(n=>
    `<div class="star${n<=val?' lit':''}" onclick="setStar('${k}',${n})">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </div>`
  ).join('');
}
function setStar(k,n){
  const[a,t,i]=k.split('_');
  getTS(a,t,parseInt(i)).aseo=n;
  persistCurrent(); renderChecklist();
}
function toggle(a,t,i){
  getTS(a,t,i).done=!getTS(a,t,i).done;
  persistCurrent(); updateProg();
  // re-render just that card's checkbox
  const chk=document.getElementById('chk-'+a+'_'+t+'_'+i);
  const lbl=document.getElementById('lbl-'+a+'_'+t+'_'+i);
  const s=getTS(a,t,i);
  if(chk){chk.className='chk'+(s.done?' done':'');chk.innerHTML=s.done?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':'';}
  if(lbl){lbl.className='task-name'+(s.done?' done':'');}
}
function setVal(k,val){
  const[a,t,i]=k.split('_');
  getTS(a,t,i).val=val;
  persistCurrent(); updateProg();
  const el=document.getElementById('tst-'+k);
  if(el){const tk=(CL[a]||{})[t]||[]; if(tk[parseInt(i)]) el.outerHTML=tempSt(val,tk[parseInt(i)].rango||[0,9999],tk[parseInt(i)].unit||'°C');}
}
function getArqueo(){
  const tasks=(CL[curArea]||{})[curTurno]||[];
  let ci=0,da=0,si=0;
  tasks.forEach((tk,i)=>{
    const s=getTS(curArea,curTurno,i);
    if(tk.campo==='Efectivo cierre')ci=parseFloat(s.val)||0;
    if(tk.campo==='Ventas datáfono')da=parseFloat(s.val)||0;
    if(tk.campo==='Ventas sistema')si=parseFloat(s.val)||0;
  });
  const tot=ci+da,diff=tot-si;
  return{ci,da,si,tot,diff};
}
function arqueoHtml(){
  const a=getArqueo();
  const cls=a.diff<0?'neg':a.diff>0?'pos':'';
  return`<div class="arqueo-grid">
    <div class="arq-cell"><div class="arq-lbl">Efectivo caja</div><div class="arq-val">$${a.ci.toLocaleString()}</div></div>
    <div class="arq-cell"><div class="arq-lbl">Ventas datáfono</div><div class="arq-val">$${a.da.toLocaleString()}</div></div>
    <div class="arq-cell"><div class="arq-lbl">Total recaudado</div><div class="arq-val">$${a.tot.toLocaleString()}</div></div>
    <div class="arq-cell"><div class="arq-lbl">Diferencia vs sistema</div><div class="arq-val ${cls}">${a.diff>=0?'+':''}$${a.diff.toLocaleString()}</div></div>
  </div>`;
}
function datHtml(k){
  const[a,t,iStr]=k.split('_'); const i=parseInt(iStr);
  const s=getTS(a,t,i); const n=parseInt(s.val)||3;
  let rows='';
  for(let j=0;j<n;j++){
    const dk=`d_${k}_${j}`;
    if(!DATFONOS[dk])DATFONOS[dk]={est:'ok'};
    rows+=`<div class="dat-row">
      <div class="dat-num">${j+1}</div>
      <div style="flex:1;font-size:13px;">Datáfono ${j+1}</div>
      <select onchange="DATFONOS['${dk}'].est=this.value;persistCurrent()">
        <option value="ok"${DATFONOS[dk].est==='ok'?' selected':''}>Funcionando</option>
        <option value="danado"${DATFONOS[dk].est==='danado'?' selected':''}>Dañado</option>
        <option value="faltante"${DATFONOS[dk].est==='faltante'?' selected':''}>Faltante</option>
      </select></div>`;
  }
  return`<div class="field-row" style="margin-bottom:6px;">
    <span class="field-label">Cantidad:</span>
    <input type="number" min="1" max="10" value="${n}" style="width:55px" oninput="getTS('${a}','${t}',${i}).val=this.value;persistCurrent();renderChecklist();">
  </div>${rows}`;
}

function renderChecklist(){
  const tasks=(CL[curArea]||{})[curTurno]||[];
  const fkey=sfk();
  const signed=SIGNED[fkey];
  const{d,total}=calcProg(curArea,curTurno);
  const p=total?Math.round(d/total*100):0;
  let html=`<div class="prog-wrap">
    <div class="prog-top"><span class="prog-label" id="prog-lbl">${d} de ${total} tareas</span><span class="prog-pct" id="prog-pct">${p}%</span></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:${p}%"></div></div>
  </div>`;

  if(signed){
    html+=`<div class="signed-banner" style="margin:0 16px 8px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      <div><div class="signed-txt">Firmado — ${signed.nombre}</div><div class="signed-sub">${signed.hora}</div></div>
    </div>`;

    html+=`<div style="padding:3rem 1rem;text-align:center;color:var(--txt3);font-size:13px;">Sin tareas para este turno.</div>`;

    const areaName=AREAS_LIST.find(a=>a.id===curArea)?.name||'';
    const turnoName=TURNOS_LIST.find(t=>t.id===curTurno)?.name||'';
    html+=`<div class="sec-lbl">${areaName} — ${turnoName}</div>`;

    tasks.forEach((tk,i)=>{
      const k=tsk(curArea,curTurno,i);
      const s=getTS(curArea,curTurno,i);
      let inner='';

      if(tk.tipo==='check'){
        inner=`<div class="task-main">
          <div class="chk${s.done?' done':''}" id="chk-${k}" onclick="toggle('${curArea}','${curTurno}',${i})">
            ${s.done?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}
          </div>
          <div class="task-body">
            <div class="task-name${s.done?' done':''}" id="lbl-${k}">${tk.t}</div>
            <div class="task-badges">
              ${tk.crit?'<span class="badge b-crit">Obligatoria</span>':''}
              ${tk.badge==='rot'?'<span class="badge b-rot">Rotativo</span>':''}
              ${tk.badge==='freq'?'<span class="badge b-freq">Día específico</span>':''}
            </div>
          </div>
        </div>`;

          <div class="task-badges" style="margin-bottom:5px;"><span class="badge b-aseo">Calificar 1–5</span>${tk.crit?'<span class="badge b-crit">Obligatorio</span>':''}</div>

function getAlertas(){
  const alerts=[];
  const hora=new Date().getHours();
  AREAS_LIST.forEach(area=>{
    TURNOS_LIST.forEach(turno=>{
      const tasks=(CL[area.id]||{})[turno.id]||[];
      // Check signed
      const fkey=`${area.id}_${turno.id}`;
      // Check temperatures out of range
      tasks.forEach((tk,i)=>{
        if(tk.tipo==='temp'&&tk.crit){
          const s=getTS(area.id,turno.id,i);
          if(s.val!==''&&s.val!==null){
            const v=parseFloat(s.val);
            if(!isNaN(v)&&(v<tk.rango[0]||v>tk.rango[1])){
              alerts.push({tipo:'crit',txt:`Temperatura fuera de rango: ${tk.t}`,sub:`${area.name} · ${turno.name} · Valor: ${v}${tk.unit||'°C'} (esperado ${tk.rango[0]} a ${tk.rango[1]}${tk.unit||'°C'})`});
            }
          }
        }
      });
      // Faltante de caja
      if(area.id==='caja'&&turno.id==='cierre'){
        const arq=getArqueoForArea('caja','cierre');
        if(arq.si>0&&arq.diff<0){
          alerts.push({tipo:'crit',txt:`Faltante de caja: $${Math.abs(arq.diff).toLocaleString()}`,sub:`Punto: ${PUNTOS[curPunto]?.name||'—'} · Cajero: ${SIGNED[fkey]?.nombre||'Sin firmar'}`});
        }
      }
      // Area sin completar según hora
      const{d,total}=calcProg(area.id,turno.id);
      const p=total?Math.round(d/total*100):0;
      if(total>0&&p<100){
        let esHora=false;
        if(turno.id==='apertura'&&hora>=6&&hora<=10)esHora=true;
        if(turno.id==='medio'&&hora>=11&&hora<=15)esHora=true;
        if(turno.id==='cierre'&&hora>=20&&hora<=23)esHora=true;
        if(esHora&&p<50) alerts.push({tipo:'warn',txt:`${area.name} — turno ${turno.name} al ${p}%`,sub:`${d} de ${total} tareas completadas · Hora actual: ${hora}:00`});
      }
    });
  });
  return alerts;
}

function getArqueoForArea(a,t){
  const tasks=(CL[a]||{})[t]||[];
  let ci=0,da=0,si=0;
  tasks.forEach((tk,i)=>{
    const s=getTS(a,t,i);
    if(tk.campo==='Efectivo cierre')ci=parseFloat(s.val)||0;
    if(tk.campo==='Ventas datáfono')da=parseFloat(s.val)||0;
    if(tk.campo==='Ventas sistema')si=parseFloat(s.val)||0;
  });
  return{ci,da,si,tot:ci+da,diff:(ci+da)-si};
}

function buildWspMsg(alerts){
  if(!alerts.length)return'✅ Todo en orden en '+PUNTOS[curPunto]?.name;
  let msg=`🚨 *CheckResto — ${PUNTOS[curPunto]?.name}*\n`;
  msg+=`📅 ${new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}\n\n`;
  alerts.forEach(a=>{
    msg+=(a.tipo==='crit'?'🔴':'🟡')+` ${a.txt}\n_${a.sub}_\n\n`;
  });
  return msg.trim();
}

function sendWsp(){
  const alerts=getAlertas();
  const msg=buildWspMsg(alerts);
  const phone='573000000000'; // placeholder
  const url=`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}

      <div class="kpi-label">${p.icon} ${p.name} — Aseo</div>
      <div class="kpi-val ${cls}">${cnt?avg+'/5':'—'}</div>
      <div class="kpi-sub">${cnt} calificaciones</div>
    </div>`;
  });
  html+='</div>';

  // Faltantes de caja
  html+=`<div class="sec-lbl">Arqueo de caja</div>`;
  Object.entries(PUNTOS).forEach(([pid,p])=>{
    const d=loadDataDate(pid,adminDate,'caja','cierre');
    const tasks=CL.caja.cierre;
    let ci=0,da=0,si=0;
    (d?.tasks||[]).forEach((t,i)=>{
      const tk=tasks[i];if(!tk)return;
      if(tk.campo==='Efectivo cierre')ci=parseFloat(t.val)||0;
      if(tk.campo==='Ventas datáfono')da=parseFloat(t.val)||0;
      if(tk.campo==='Ventas sistema')si=parseFloat(t.val)||0;
    });
    const diff=(ci+da)-si;
    html+=`<div class="hist-card" style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span style="font-size:13px;font-weight:600;">${p.icon} ${p.name}</span>
        <span style="font-size:16px;font-weight:700;color:${si>0?(diff<0?'var(--red)':'var(--green)'):'var(--txt3)'};">${si>0?(diff>=0?'+':'')+' $'+diff.toLocaleString():'Sin datos'}</span>
      </div>
      ${si>0?`<div style="font-size:11px;color:var(--txt3);">Efectivo: $${ci.toLocaleString()} · Datáfono: $${da.toLocaleString()} · Sistema: $${si.toLocaleString()}</div>`:''}
      ${d?.signed?`<div style="font-size:11px;color:var(--txt3);margin-top:3px;">Cajero: ${d.signed.nombre} · ${d.signed.hora}</div>`:''}
    </div>`;
  });

  // WhatsApp resumen admin
  html+=`<div class="sec-lbl">Enviar reporte admin</div>
  <button class="wsp-btn" onclick="sendWspAdmin()">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Enviar resumen comparativo
  </button>
  <div style="padding:0 16px 24px;font-size:11px;color:var(--txt3);margin-top:-4px;">Resumen de ambos puntos listo para WhatsApp</div>`;

  document.getElementById('admin-content').innerHTML=html;
}

function setAdminDate(d){adminDate=d;renderAdmin();}

function sendWspAdmin(){
  let msg=`📊 *CheckResto — Reporte Admin*\n`;
  msg+=`📅 ${adminDate}\n\n`;
  Object.entries(PUNTOS).forEach(([pid,p])=>{
    msg+=`${p.icon} *${p.name}*\n`;
    AREAS_LIST.forEach(area=>{
      let total=0,done=0;
      TURNOS_LIST.forEach(turno=>{
        const tasks=(CL[area.id]||{})[turno.id]||[];
        const d=loadDataDate(pid,adminDate,area.id,turno.id);
        total+=tasks.length;
        (d?.tasks||[]).forEach((t,i)=>{
          const tk=tasks[i];if(!tk)return;
          if(tk.tipo==='check'&&t.done)done++;
          else if(tk.tipo==='aseo'&&t.aseo>0)done++;
          else if((tk.tipo==='temp'||tk.tipo==='dinero')&&t.val!=='')done++;
          else if(tk.tipo==='arqueo'||tk.tipo==='datofonos')done++;
        });
      });
      if(total){
        const pp=Math.round(done/total*100);
        msg+=`  • ${area.name.split('/')[0].trim()}: ${pp}%\n`;
      }
    });
    // Caja
    const cj=loadDataDate(pid,adminDate,'caja','cierre');
    if(cj){
      let ci=0,da=0,si=0;
      (cj.tasks||[]).forEach((t,i)=>{
        const tk=CL.caja.cierre[i];if(!tk)return;
        if(tk.campo==='Efectivo cierre')ci=parseFloat(t.val)||0;
        if(tk.campo==='Ventas datáfono')da=parseFloat(t.val)||0;
        if(tk.campo==='Ventas sistema')si=parseFloat(t.val)||0;
      });
      if(si>0){const d=(ci+da)-si;msg+=`  💰 Caja: ${d>=0?'+':''}$${d.toLocaleString()}\n`;}
    }
    msg+='\n';
  });
  const phone='573000000000';
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
}

// ── RELOJ EN VIVO ──────────────────────────────────────────────
function tickClock(){
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()).padStart(2,'0');
  const timeStr=`${hh}:${mm}`;
  const DIAS=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const dateStr=`${DIAS[now.getDay()]} ${now.getDate()} de ${MESES[now.getMonth()]}`;
  const lt=document.getElementById('login-time');
  const ld=document.getElementById('login-date');
  const hc=document.getElementById('hdr-clock');
  if(lt)lt.textContent=timeStr;
  if(ld)ld.textContent=dateStr;
  if(hc)hc.textContent=timeStr;
}
tickClock();
setInterval(tickClock,10000);
</script>
